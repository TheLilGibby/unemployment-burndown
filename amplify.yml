version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "VITE_PLAID_API_URL=$VITE_PLAID_API_URL"
        - '[ -n "$VITE_PLAID_API_URL" ] || { echo "ERROR: VITE_PLAID_API_URL is not set. Set it in Amplify Console > Environment variables to your API Gateway URL (e.g. https://XXXX.execute-api.us-west-1.amazonaws.com/Prod)"; exit 1; }'
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
customRules:
  - source: </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>
    target: /index.html
    status: '200'
