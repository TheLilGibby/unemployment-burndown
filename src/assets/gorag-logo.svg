<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 150" width="420" height="150">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Wordmark — centered without icon -->
  <g transform="translate(30, 100)">
    <!-- "GO" in bold -->
    <text font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-weight="800" font-size="88" fill="#1E1B4B" letter-spacing="-3">GO</text>
    <!-- "RAG" in gradient -->
    <text x="120" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-weight="800" font-size="88" fill="url(#brandGrad)" letter-spacing="-3">RAG</text>
  </g>

  <!-- Accent underline -->
  <rect x="33" y="110" width="100" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Tagline -->
  <text x="33" y="128"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400" font-size="14" fill="#6B7280" letter-spacing="3.5">AI-POWERED GROWTH</text>
</svg>