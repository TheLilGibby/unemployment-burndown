AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Plaid integration backend for Financial Burndown Tracker

Parameters:
  PlaidClientId:
    Type: String
    Description: Plaid API client ID
    NoEcho: true
  PlaidSecret:
    Type: String
    Description: Plaid API secret key
    NoEcho: true
  PlaidEnv:
    Type: String
    Description: Plaid environment (sandbox, development, production)
    Default: sandbox
    AllowedValues:
      - sandbox
      - development
      - production
  AllowedOrigin:
    Type: String
    Description: CORS allowed origin (e.g. https://your-app.amplifyapp.com)
  S3Bucket:
    Type: String
    Description: S3 bucket storing data.json
    Default: rag-consulting-burndown
  S3Region:
    Type: String
    Description: S3 bucket region
    Default: us-west-1
  JwtSecret:
    Type: String
    Description: Secret key for signing JWTs
    NoEcho: true
  PlaidMonthlyBudget:
    Type: String
    Description: Max monthly Plaid spend in dollars (default $10)
    Default: '10'
  PlaidEstCostPerCall:
    Type: String
    Description: Estimated cost per Plaid API call in dollars (default $0.10)
    Default: '0.10'
  PlaidMaxSyncPages:
    Type: String
    Description: Max pagination pages per sync call (prevents runaway loops)
    Default: '10'
  PlaidSyncCooldownSeconds:
    Type: String
    Description: Minimum seconds between syncs for the same item
    Default: '300'
  SendGridApiKey:
    Type: String
    Description: SendGrid API key for sending emails
    NoEcho: true
    Default: ''
  SendGridFromEmail:
    Type: String
    Description: Verified sender email for SendGrid
    Default: 'noreply@example.com'
  AppUrl:
    Type: String
    Description: Frontend application URL for password reset links
    Default: 'http://localhost:5173'
  PlaidEncryptionKey:
    Type: String
    Description: AES-256-GCM key for encrypting Plaid access tokens at rest
    NoEcho: true
  SnapTradeClientId:
    Type: String
    Description: SnapTrade API client ID
    NoEcho: true
    Default: ''
  SnapTradeApiSecret:
    Type: String
    Description: SnapTrade API consumer key (secret)
    NoEcho: true
    Default: ''
  SnapTradeMonthlyBudget:
    Type: String
    Description: Max monthly SnapTrade spend in dollars
    Default: '10'
  SnapTradeEstCostPerCall:
    Type: String
    Description: Estimated cost per SnapTrade API call in dollars
    Default: '0.01'
  SnapTradeSyncCooldownSeconds:
    Type: String
    Description: Minimum seconds between SnapTrade syncs
    Default: '300'
  SmsEnabled:
    Type: String
    Description: Enable SMS OTP via AWS SNS (set to 'true' in production)
    Default: 'false'
  SnapshotRetentionDays:
    Type: String
    Description: Number of days to retain daily snapshots (older snapshots are pruned)
    Default: '90'
  PlaidWebhookUrl:
    Type: String
    Description: Public URL for receiving Plaid webhooks (e.g. https://<api-id>.execute-api.<region>.amazonaws.com/Prod/plaid/webhook)
    Default: ''

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Architectures:
      - arm64
    Environment:
      Variables:
        PLAID_CLIENT_ID: !Ref PlaidClientId
        PLAID_SECRET: !Ref PlaidSecret
        PLAID_ENV: !Ref PlaidEnv
        TOKENS_TABLE: !Ref PlaidTokensTable
        S3_BUCKET: !Ref S3Bucket
        S3_REGION: !Ref S3Region
        ALLOWED_ORIGIN: !Ref AllowedOrigin
        JWT_SECRET: !Ref JwtSecret
        USERS_TABLE: !Ref UsersTable
        ORGS_TABLE: !Ref OrganizationsTable
        ORG_MEMBERS_TABLE: !Ref OrgMembersTable
        PLAID_MONTHLY_BUDGET: !Ref PlaidMonthlyBudget
        PLAID_EST_COST_PER_CALL: !Ref PlaidEstCostPerCall
        PLAID_MAX_SYNC_PAGES: !Ref PlaidMaxSyncPages
        PLAID_SYNC_COOLDOWN_SECONDS: !Ref PlaidSyncCooldownSeconds
        SENDGRID_API_KEY: !Ref SendGridApiKey
        SENDGRID_FROM_EMAIL: !Ref SendGridFromEmail
        APP_URL: !Ref AppUrl
        PLAID_ENCRYPTION_KEY: !Ref PlaidEncryptionKey
        SNAPTRADE_CLIENT_ID: !Ref SnapTradeClientId
        SNAPTRADE_API_SECRET: !Ref SnapTradeApiSecret
        SNAPTRADE_MONTHLY_BUDGET: !Ref SnapTradeMonthlyBudget
        SNAPTRADE_EST_COST_PER_CALL: !Ref SnapTradeEstCostPerCall
        SNAPTRADE_SYNC_COOLDOWN_SECONDS: !Ref SnapTradeSyncCooldownSeconds
        INVITES_TABLE: !Ref HouseholdInvitesTable
        SMS_ENABLED: !Ref SmsEnabled
        SNAPSHOT_RETENTION_DAYS: !Ref SnapshotRetentionDays
        PLAID_WEBHOOK_URL: !Ref PlaidWebhookUrl

  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: !Sub "'${AllowedOrigin}'"

Resources:
  # ---------- DynamoDB ----------
  PlaidTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PlaidTokens
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: itemId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: itemId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: itemId-index
          KeySchema:
            - AttributeName: itemId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: BurndownUsers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  OrganizationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Organizations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orgId
          AttributeType: S
        - AttributeName: joinCode
          AttributeType: S
      KeySchema:
        - AttributeName: orgId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: joinCode-index
          KeySchema:
            - AttributeName: joinCode
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  OrgMembersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: OrgMembers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orgId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: orgId
          KeyType: HASH
        - AttributeName: userId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  HouseholdInvitesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: HouseholdInvites
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: inviteId
          AttributeType: S
        - AttributeName: inviteToken
          AttributeType: S
        - AttributeName: orgId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: inviteId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: inviteToken-index
          KeySchema:
            - AttributeName: inviteToken
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: orgId-index
          KeySchema:
            - AttributeName: orgId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orgId
          AttributeType: S
        - AttributeName: jobId
          AttributeType: S
      KeySchema:
        - AttributeName: orgId
          KeyType: HASH
        - AttributeName: jobId
          KeyType: RANGE

  # ---------- Health Check ----------
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/health.handler
      CodeUri: .
      Timeout: 10
      Policies:
        - Statement:
            - Effect: Allow
              Action: dynamodb:DescribeTable
              Resource: !GetAtt UsersTable.Arn
        - Statement:
            - Effect: Allow
              Action: s3:ListBucket
              Resource: !Sub arn:aws:s3:::${S3Bucket}
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/health
            Method: get

  # ---------- Org Lambda Functions ----------
  OrgCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/orgCreate.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrganizationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrgMembersTable
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/org/create
            Method: post

  OrgJoinFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/orgJoin.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrganizationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrgMembersTable
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/org/join
            Method: post

  OrgGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/orgGet.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrganizationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrgMembersTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/org
            Method: get

  OrgRegenerateCodeFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/orgRegenerateCode.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrganizationsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/org/regenerate-code
            Method: post

  # ---------- Invite Lambda Functions ----------
  InviteCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/inviteCreate.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HouseholdInvitesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrganizationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrgMembersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/org/invites
            Method: post

  InviteListFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/inviteList.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HouseholdInvitesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/org/invites
            Method: get

  InviteDeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/inviteDelete.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HouseholdInvitesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/org/invites/{inviteId}
            Method: delete

  InviteValidateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/inviteAccept.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HouseholdInvitesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrganizationsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/org/invites/validate
            Method: get

  # ---------- Phone OTP Lambda Functions ----------
  SendPhoneOtpFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/sendPhoneOtp.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - Statement:
            - Effect: Allow
              Action: sns:Publish
              Resource: '*'
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/auth/send-phone-otp
            Method: post

  VerifyPhoneOtpFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/verifyPhoneOtp.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref HouseholdInvitesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrganizationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrgMembersTable
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/auth/verify-phone-otp
            Method: post

  # ---------- Jobs Lambda Functions ----------
  JobsListFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/jobsList.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/jobs
            Method: get

  JobsCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/jobsCreate.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/jobs
            Method: post

  JobsUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/jobsUpdate.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/jobs/{jobId}
            Method: put

  JobsDeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/jobsDelete.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/jobs/{jobId}
            Method: delete

  # ---------- Auth Lambda Functions ----------
  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/register.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref HouseholdInvitesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/auth/register
            Method: post

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/login.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/auth/login
            Method: post

  VerifyMfaFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/verifyMfa.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/auth/verify-mfa
            Method: post

  SetupMfaFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/setupMfa.setupHandler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/auth/setup-mfa
            Method: post

  EnableMfaFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/setupMfa.enableHandler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/auth/enable-mfa
            Method: post

  RefreshTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/refreshToken.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/auth/refresh
            Method: post

  MeFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/me.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/auth/me
            Method: get

  ProfileUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/profileUpdate.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/auth/profile
            Method: put

  ForgotPasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/forgotPassword.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/auth/forgot-password
            Method: post

  ResetPasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/resetPassword.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/auth/reset-password
            Method: post

  RecordConsentFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/recordConsent.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/privacy/consent
            Method: post

  DeleteAccountFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/deleteAccount.handler
      CodeUri: .
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlaidTokensTable
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api/auth/delete-account
            Method: post

  # ---------- Plaid Lambda Functions ----------
  PlaidLinkTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/linkToken.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlaidTokensTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /plaid/link-token
            Method: post

  PlaidLinkTokenUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/linkTokenUpdate.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlaidTokensTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /plaid/link-token/update
            Method: post

  PlaidExchangeFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/exchange.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlaidTokensTable
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /plaid/exchange
            Method: post

  PlaidSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/sync.handler
      CodeUri: .
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlaidTokensTable
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /plaid/sync
            Method: post

  PlaidAccountsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/accounts.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlaidTokensTable
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
        - Statement:
            - Effect: Allow
              Action: s3:ListBucket
              Resource: !Sub arn:aws:s3:::${S3Bucket}
      Events:
        Api:
          Type: Api
          Properties:
            Path: /plaid/accounts
            Method: get

  PlaidDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/disconnect.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlaidTokensTable
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /plaid/disconnect
            Method: post

  PlaidBudgetFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/budget.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlaidTokensTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /plaid/budget
            Method: get

  PlaidWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/plaidWebhook.handler
      CodeUri: .
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlaidTokensTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrgMembersTable
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /plaid/webhook
            Method: post

  # ---------- SnapTrade Lambda Functions ----------
  SnapTradeConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/snapTradeConnect.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlaidTokensTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /snaptrade/connect
            Method: post

  SnapTradeCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/snapTradeCallback.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlaidTokensTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /snaptrade/callback
            Method: post

  SnapTradeAccountsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/snapTradeAccounts.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlaidTokensTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /snaptrade/accounts
            Method: get

  SnapTradeSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/snapTradeSync.handler
      CodeUri: .
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlaidTokensTable
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /snaptrade/sync
            Method: post

  SnapTradeDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/snapTradeDisconnect.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlaidTokensTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /snaptrade/disconnect
            Method: post

  SnapTradeReconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/snapTradeReconnect.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
